<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel de Administração</title>
  </head>
  <body>
    <!-- Scripts de carregamento corrigidos e seguros -->
    <script src="https://jsdelivr.net"></script>
    </script>

    <script>
      // Inicialização do painel com as suas configurações originais
      window.CMS.init({
        config: {
          backend: {
            name: 'git-gateway',
            branch: 'Principal'
          },
          media_folder: 'assets',
          public_folder: '/assets',
          collections: [
            {
              name: 'landingpage',
              label: 'Textos da Landing Page',
              files: [
                {
                  file: 'index.html',
                  label: 'Página Principal (Index)',
                  name: 'index',
                  fields: [
                    { label: 'Título da Página', name: 'title', widget: 'string' }
                  ]
                }
              ]
            }
          ]
        }
      });
    </script>
  </body>
</html>
