backend:
  name: git-gateway
  branch: main

media_folder: "assets"
public_folder: "/assets"

collections:
  - name: "paginas"
    label: "Páginas do Site"
    files:
      - file: "index.html"
        label: "Página Inicial (Index)"
        name: "index"
        fields:
          - { label: "Título da Página", name: "title", widget: "string" }
      - file: "forta.html"
        label: "Página Forta"
        name: "forta"
        fields:
          - { label: "Título", name: "title", widget: "string" }
