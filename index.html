<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel de Administração</title>
    <!-- Widget de Identidade da Netlify -->
    </script>
  </head>
  <body>
    <!-- Script Principal do Decap CMS -->
    <script src="https://unpkg.com@^3.0.0/dist/decap-cms.js"></script>

    <script>
      // Aguarda 1 segundo após a página carregar para forçar a abertura do login
      window.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
          if (window.netlifyIdentity) {
            window.netlifyIdentity.open();
          } else {
            console.log("A aguardar pelo Netlify Identity...");
          }
        }, 1000); 
      });
    </script>
  </body>
</html>
